<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LottoPro | Tu App de Sorteos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="manifest" href="manifest.json">
  <style>
    .tab-content { display: none; }
    .tab-content.active { display: block; }
  </style>
</head>
<body class="bg-gray-100 min-h-screen">

  <div class="bg-slate-900 py-6 text-white text-center shadow-lg">
    <h1 class="text-3xl font-bold">Lotto<span class="text-amber-500">Pro</span></h1>
  </div>

  <nav class="bg-white p-4 shadow-sm flex justify-center gap-4 overflow-x-auto text-sm md:text-base" role="navigation" aria-label="Main">
    <button onclick="showTab('jugar')" class="font-bold text-blue-900">Jugar</button>
    <button onclick="showTab('estrategia')" class="font-bold text-blue-900">Estrategias</button>
    <button onclick="showTab('calendario')" class="font-bold text-blue-900">Calendario</button>
    <button onclick="showTab('historial')" class="font-bold text-blue-900">Historial</button>
    <button onclick="showTab('perfil')" class="font-bold text-blue-900">Perfil</button>
  </nav>

  <main class="max-w-2xl mx-auto p-4">
    <section id="jugar" class="tab-content active bg-white p-6 rounded-xl shadow" aria-labelledby="jugarTitle">
      <h2 id="jugarTitle" class="text-xl font-bold mb-4">Talonario Virtual</h2>

      <label class="sr-only" for="numeroInput">Número (000-999)</label>
      <input type="text" id="numeroInput" inputmode="numeric" pattern="\d{3}" maxlength="3" placeholder="Número (000-999)" class="w-full border p-3 rounded mb-2" aria-describedby="numeroHelp">

      <label class="sr-only" for="montoInput">Monto</label>
      <input type="number" id="montoInput" placeholder="Monto ($)" class="w-full border p-3 rounded mb-4" min="1" step="0.01">

      <p id="numeroHelp" class="text-sm text-gray-500 mb-2">Ingrese 3 dígitos (ej.: 007)</p>

      <button id="payBtn" class="w-full bg-blue-900 text-white p-3 rounded font-bold">Pagar y Jugar</button>
    </section>

    <section id="estrategia" class="tab-content bg-white p-6 rounded-xl shadow">
      <h2 class="text-xl font-bold mb-4">Estrategias</h2>
      <div id="galeriaEstrategias" class="grid grid-cols-2 gap-4"></div>
    </section>

    <section id="calendario" class="tab-content bg-white p-6 rounded-xl shadow">
      <h2 class="text-xl font-bold mb-4">Calendario</h2>
      <table class="w-full text-left">
        <tbody id="tablaCalendario"></tbody>
      </table>
    </section>

    <section id="historial" class="tab-content bg-white p-6 rounded-xl shadow">
      <h2 class="text-xl font-bold mb-4">Historial</h2>
      <table class="w-full text-left" id="tablaHistorial"></table>
    </section>

    <section id="perfil" class="tab-content bg-white p-6 rounded-xl shadow">
      <h2 class="text-xl font-bold mb-4">Mi Perfil</h2>
      <div id="formContainer" class="space-y-3">
        <input type="text" id="userName" placeholder="Nombre" class="w-full border p-2 rounded">
        <input type="text" id="userBank" placeholder="Cuenta Bancaria" class="w-full border p-2 rounded">
        <button id="saveProfileBtn" class="w-full bg-green-600 text-white p-2 rounded">Guardar</button>
      </div>
    </section>
  </main>

  <script>
    // Navigation
    function showTab(id) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    // Utility: pad number to 3 digits
    function pad3(n) {
      return String(n).padStart(3, '0');
    }

    // Load and save profile
    function guardarPerfil() {
      const name = document.getElementById('userName').value.trim();
      const bank = document.getElementById('userBank').value.trim();
      const profile = { name, bank, savedAt: new Date().toISOString() };
      localStorage.setItem('lp_profile', JSON.stringify(profile));
      alert('Datos guardados');
    }
    document.getElementById('saveProfileBtn').addEventListener('click', guardarPerfil);

    function loadProfile() {
      const raw = localStorage.getItem('lp_profile');
      if (!raw) return;
      try {
        const p = JSON.parse(raw);
        document.getElementById('userName').value = p.name || '';
        document.getElementById('userBank').value = p.bank || '';
      } catch (e) { console.warn('profile parse error', e); }
    }

    // Simple history logic
    function addToHistory(ticket) {
      const key = 'lp_history';
      const raw = localStorage.getItem(key);
      const arr = raw ? JSON.parse(raw) : [];
      arr.unshift(ticket); // newest first
      if (arr.length > 100) arr.length = 100;
      localStorage.setItem(key, JSON.stringify(arr));
      renderizarHistorial();
    }

    function renderizarHistorial() {
      const raw = localStorage.getItem('lp_history');
      const table = document.getElementById('tablaHistorial');
      table.innerHTML = '';
      if (!raw) { table.innerHTML = '<tr><td>No hay entradas</td></tr>'; return; }
      const arr = JSON.parse(raw);
      const rows = arr.map(r => `<tr class="border-b"><td class="p-2">${r.numero}</td><td class="p-2">$${r.monto}</td><td class="p-2 text-sm text-gray-500">${new Date(r.when).toLocaleString()}</td></tr>`).join('');
      table.innerHTML = `<thead><tr><th class="p-2 text-left">Número</th><th class="p-2 text-left">Monto</th><th class="p-2 text-left">Fecha</th></tr></thead><tbody>${rows}</tbody>`;
    }

    // Payment / play flow (stub)
    async function procesarPago() {
      const numeroField = document.getElementById('numeroInput');
      const montoField = document.getElementById('montoInput');

      const numeroRaw = numeroField.value.trim();
      const numeroValid = /^\d{3}$/.test(numeroRaw) ? numeroRaw : null;
      if (!numeroValid) { alert('Ingrese un número de 3 dígitos (ej.: 007).'); numeroField.focus(); return; }

      const monto = parseFloat(montoField.value);
      if (Number.isNaN(monto) || monto <= 0) { alert('Ingrese un monto válido mayor que 0.'); montoField.focus(); return; }

      // Save to history and redirect to payment provider stub
      const ticket = { numero: numeroValid, monto: monto.toFixed(2), when: new Date().toISOString() };
      addToHistory(ticket);

      // Placeholder: in production, call your backend to create a Mercado Pago preference and redirect to MP checkout
      alert('Redirigiendo a Mercado Pago (stub). En producción, implemente el flujo con su servidor y credenciales.');
      // Example: window.location.href = '/create-payment?numero=' + numeroValid + '&monto=' + monto;
    }

    // Hook up buttons
    document.getElementById('payBtn').addEventListener('click', procesarPago);

    // Wire initial state
    loadProfile();
    renderizarHistorial();
  </script>
</body>
</html>
